<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; }
body { background: #000; display: inline-block; }
.logo-box {
  padding: 20px 28px 18px;
  display: inline-block;
  line-height: 1;
}
.beast {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 38px;
  letter-spacing: 2px;
  color: #fff;
  display: inline;
}
.tech {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 38px;
  letter-spacing: 2px;
  color: transparent;
  -webkit-text-stroke: 1.2px #00FF41;
  filter: drop-shadow(0 0 3px rgba(0,255,65,0.4));
  display: inline;
}
.line {
  display: block;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, #00FF41, rgba(0,255,65,0.2));
  box-shadow: 0 0 6px rgba(0,255,65,0.3);
  margin: 6px 0 8px;
}
.eng {
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 5px;
  color: #fff;
  display: block;
}
</style>
</head>
<body>
<div class="logo-box">
  <span class="beast">BEAST</span><span class="tech">TECH</span>
  <span class="line"></span>
  <span class="eng">ENGINEERING</span>
</div>
</body>
</html>
