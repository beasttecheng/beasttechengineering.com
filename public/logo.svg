<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900');
    </style>
  </defs>
  <rect width="400" height="120" fill="#000000"/>
  <!-- BEAST - solid white -->
  <text x="20" y="52" font-family="Orbitron, sans-serif" font-weight="900" font-size="42" letter-spacing="2" fill="#ffffff">BEAST</text>
  <!-- TECH - wireframe green -->
  <text x="215" y="52" font-family="Orbitron, sans-serif" font-weight="700" font-size="42" letter-spacing="2" fill="none" stroke="#00FF41" stroke-width="1.2" filter="url(#glow)">TECH</text>
  <!-- Glowing divider line -->
  <line x1="20" y1="62" x2="380" y2="62" stroke="#00FF41" stroke-width="1" opacity="0.6" filter="url(#glow)"/>
  <!-- ENGINEERING - crisp white -->
  <text x="20" y="82" font-family="Orbitron, sans-serif" font-weight="600" font-size="13" letter-spacing="6" fill="#ffffff">ENGINEERING</text>
  <!-- Tagline -->
  <text x="20" y="105" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#666666">REGISTERED ENGINEERING FIRM — TEXAS</text>
</svg>
